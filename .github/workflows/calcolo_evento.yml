name: Calcola Preventivo Evento

on:
  issues:
    types: [opened]

jobs:
  calcola_e_invia:
    runs-on: ubuntu-latest
    steps:
    - name: Preleva il codice della repository
      uses: actions/checkout@v3

    - name: Configura Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Esegui il calcolo e invia a Telegram
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |     
       # Estrae il numero degli ospiti eliminando spazi o caratteri strani
        OSPITI=$(echo "${{ github.event.issue.body }}" | grep -i "Ospiti:" | awk '{print $2}' | tr -d '\r' | tr -cd '0-9')
        
        # Estrae il nome del menu e sostituisce i trattini bassi (_) con quelli normali (-) per sicurezza
        MENU=$(echo "${{ github.event.issue.body }}" | grep -i "Menu:" | awk '{print $2}' | tr -d '\r' | tr '_' '-')
        
        # Valori di backup se la Issue è vuota o scritta male
        if [ -z "$OSPITI" ]; then OSPITI=10; fi
        if [ -z "$MENU" ]; then MENU="menu-pesce"; fi
        
        python calcola_preventivo.py $OSPITI $MENU
