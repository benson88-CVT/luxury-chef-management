name: Calcola Preventivo Evento

on:
  issues:
    types: [opened]

jobs:
  calcola_e_invia:
    runs-on: ubuntu-latest
    steps:
    - name: Preleva il codice della repository
      uses: actions/checkout@v3

    - name: Configura Python
      uses: actions/setup-python@v4
      with:
        python-python: '3.10'

    - name: Esegui il calcolo e invia a Telegram
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        # Legge il corpo della Issue. Cerca una riga con scritto "Ospiti: X" e estrae il numero
        OSPITI=$(echo "${{ github.event.issue.body }}" | grep -i "Ospiti:" | awk '{print $2}' | tr -d '\r')
        
        # Cerca una riga con scritto "Menu: X" e estrae il nome del file (es: menu-pesce)
        MENU=$(echo "${{ github.event.issue.body }}" | grep -i "Menu:" | awk '{print $2}' | tr -d '\r')
        
        # Se non trova i dati nella Issue, usa quelli di default (10 ospiti, menu-pesce)
        if [ -z "$OSPITI" ]; then OSPITI=10; fi
        if [ -z "$MENU" ]; then MENU="menu-pesce"; fi
        
        python calcola_preventivo.py $OSPITI $MENU
